name: build containers
run-name: building containers
on:
  workflow_dispatch:
jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-24.04
    steps:
      - name: Check out repository code
        uses: actions/checkout@v4
      - name: Run podman build - base
        run: |
          podman build -t ghcr.io/ducttape-lab/server-base:latest \
            --build-arg=BASE_IMAGE="quay.io/almalinuxorg/almalinux" \
            --build-arg=BASE_VERSION="10" \
            -f containers/Containerfile-base .
      - name: Push image to ghcr.io - base
        run: |
          podman push --creds=${{ github.actor }}:${{ secrets.GITHUB_TOKEN }} \
            ghcr.io/ducttape-lab/server-base:latest
